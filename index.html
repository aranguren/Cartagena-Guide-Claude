<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Cartagena de Indias — Tourist Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: {
      primary: "#C65D3B", "primary-dark": "#A84A2C",
      secondary: "#1B7A8C", "secondary-dark": "#145E6C",
      accent: "#E8A93C", background: "#FAF6F0", surface: "#FFFFFF",
      "surface-warm": "#F2EAE0", ink: "#2A2320", "ink-muted": "#6B5F55",
      border: "#E4D9CC", success: "#2E8B57", warning: "#E8A93C", error: "#C0392B",
    },
    fontFamily: { display: ["Fraunces", "serif"], body: ["Inter", "sans-serif"] },
    borderRadius: { pill: "999px" },
  }}};
</script>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg"/>
<link rel="stylesheet" href="assets/css/app.css"/>
</head>
<body>
<div id="app"></div>
<script src="assets/js/data.js"></script>
<script src="assets/js/i18n.js"></script>
<script src="assets/js/app.js"></script>
<script>
  const t = (k, n) => I18N.t(k, n), f = (o) => I18N.f(o);

  function render() {
    const hero =
      `<section class="relative h-[62vh] min-h-[420px] photo-overlay">` +
        `<img ${App.imgAttrs("https://picsum.photos/seed/cart-hero/900/1200", "Cartagena Old City")} class="absolute inset-0 w-full h-full object-cover"/>` +
        `<div class="relative z-10 h-full flex flex-col justify-end p-5 pb-7 text-white">` +
          `<h1 class="font-display font-semibold text-[44px] leading-[0.98]">${t("home_hero_title").replace("\n", "<br>")}</h1>` +
          `<p class="mt-2 text-white/85 text-[15px]">${t("home_hero_sub")}</p>` +
          `<form id="search-form" class="mt-4 flex items-center gap-2 bg-surface rounded-pill shadow-raised px-4 py-3">` +
            App.icon("search", "text-ink/40") +
            `<input id="search-input" type="search" enterkeyhint="search" placeholder="${t("search_ph")}" ` +
              `class="flex-1 bg-transparent border-0 focus:ring-0 text-ink text-sm placeholder:text-ink/40 p-0"/>` +
          `</form>` +
        `</div>` +
      `</section>`;

    const categories =
      `<section class="mt-6">` +
        `<h2 class="px-5 font-display text-xl font-semibold text-ink">${t("home_categories")}</h2>` +
        `<div class="mt-3 flex gap-2.5 overflow-x-auto no-scrollbar px-5 pb-1">` +
          CATEGORIES.map((c) => App.categoryChip(c, { asLink: true })).join("") +
        `</div>` +
      `</section>`;

    const featured = POIS.filter((p) => p.featured);
    const gems =
      `<section class="mt-7">` +
        `<div class="px-5 flex items-center justify-between">` +
          `<h2 class="font-display text-xl font-semibold text-ink">${t("home_featured")}</h2>` +
          `<a href="directory.html" class="text-secondary text-sm font-semibold">${t("see_all")}</a>` +
        `</div>` +
        `<div class="mt-3 flex gap-4 overflow-x-auto no-scrollbar px-5 pb-2">` +
          featured.map((p) => App.poiCard(p, { wide: true })).join("") +
        `</div>` +
      `</section>`;

    const itin =
      `<section class="mt-7">` +
        `<div class="px-5 flex items-center justify-between">` +
          `<h2 class="font-display text-xl font-semibold text-ink">${t("home_itin")}</h2>` +
          `<a href="itinerary.html" class="text-secondary text-sm font-semibold">${t("see_all")}</a>` +
        `</div>` +
        `<div class="mt-3 px-5 space-y-4">` +
          ITINERARIES.map((it) =>
            `<a href="itinerary.html?id=${it.id}" class="block relative h-36 rounded-[18px] overflow-hidden shadow-card photo-overlay">` +
              `<img ${App.imgAttrs(it.img, f(it.title))} class="absolute inset-0 w-full h-full object-cover"/>` +
              `<div class="relative z-10 h-full flex flex-col justify-end p-4 text-white">` +
                `<h3 class="font-display text-lg font-semibold leading-tight">${f(it.title)}</h3>` +
                `<p class="text-white/85 text-xs mt-1 line-clamp-1">${f(it.subtitle)}</p>` +
                `<div class="mt-1.5 flex items-center gap-3 text-white/90 text-[11px] font-medium">` +
                  `<span>${App.icon("calendar_today","text-[14px]")} ${t(it.days===1?"itin_days_one":"itin_days", it.days)}</span>` +
                  `<span>${App.icon("pin_drop","text-[14px]")} ${t("itin_stops", it.stops.length)}</span>` +
                `</div>` +
              `</div>` +
            `</a>`
          ).join("") +
        `</div>` +
      `</section>`;

    return hero + categories + gems + itin + `<div class="h-4"></div>`;
  }

  App.mount({ route: "home", render });
  App.afterPaint(() => {
    const form = document.getElementById("search-form");
    if (!form) return;
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const q = document.getElementById("search-input").value.trim();
      location.href = "directory.html" + (q ? "?q=" + encodeURIComponent(q) : "");
    });
  });
</script>
</body>
</html>
